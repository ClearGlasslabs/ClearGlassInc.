name: ClearGlass Platform CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate platform baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Validate Python syntax
        run: |
          python -m py_compile middleware/policy-engine/policy_engine.py
          python -m py_compile orchestration/workflow-examples/regulated_approval_workflow.py

      - name: Terraform format check
        run: terraform fmt -check -recursive infra/terraform/azure-foundation/
