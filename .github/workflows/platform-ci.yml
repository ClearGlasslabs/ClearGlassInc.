name: ClearGlass Platform CI

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Validate Python
        run: |
          python -m py_compile middleware/policy-engine/policy_engine.py
          python -m py_compile orchestration/workflow-examples/regulated_approval_workflow.py

      - name: Terraform format check
        run: |
          terraform fmt -check infra/terraform/azure-foundation/
